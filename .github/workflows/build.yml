name: iOS IPA

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      app_name:
        description: App name shown on iOS
        required: true
        default: Telewhite
      url_scheme:
        description: App-specific URL scheme
        required: true
        default: telewhite

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Telegram Xcode version
        run: |
          XCODE_VERSION="$(python3 -c 'import json; print(json.load(open("versions.json"))["xcode"])')"
          sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer"
          xcodebuild -version

      - name: Create build input
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          APP_NAME: ${{ inputs.app_name || 'Telewhite' }}
          APP_URL_SCHEME: ${{ inputs.url_scheme || 'telewhite' }}
        run: |
          set -euo pipefail

          mkdir -p build-input

          python3 - <<'PY'
          import json, os

          required = [
              "TG_API_ID",
              "TG_API_HASH",
          ]
          missing = [key for key in required if not os.environ.get(key)]
          if missing:
              raise SystemExit("Missing GitHub secrets: " + ", ".join(missing))

          config = {
              "bundle_id": "ph.telegra.Telegraph",
              "app_name": os.environ["APP_NAME"],
              "api_id": os.environ["TG_API_ID"],
              "api_hash": os.environ["TG_API_HASH"],
              "team_id": "C67CF9S4VU",
              "app_center_id": "0",
              "is_internal_build": "true",
              "is_appstore_build": "false",
              "appstore_id": "0",
              "app_specific_url_scheme": os.environ["APP_URL_SCHEME"],
              "premium_iap_product_id": "",
              "enable_siri": False,
              "enable_icloud": False,
          }

          with open("build-input/fork-configuration.json", "w", encoding="utf-8") as f:
              json.dump(config, f, indent=2)
              f.write("\n")
          PY

      - name: Generate temporary signing profiles
        run: |
          set -euo pipefail

          python3 -u build-system/Make/Make.py \
            generate-verification-profiles \
            --configurationPath=build-input/fork-configuration.json \
            --codesigningInformationPath=build-system/fake-codesigning \
            --destination=build-input/generated-profiles

          mkdir -p build-input/generated-codesigning/certs build-input/generated-codesigning/profiles
          cp build-system/fake-codesigning/certs/* build-input/generated-codesigning/certs/
          cp build-input/generated-profiles/*.mobileprovision build-input/generated-codesigning/profiles/

      - name: Build release IPA
        run: |
          set -euo pipefail

          sudo mkdir -p /Users/Shared
          sudo rm -rf /Users/Shared/telegram-ios
          sudo cp -R "$GITHUB_WORKSPACE" /Users/Shared/telegram-ios
          sudo chown -R "$USER":staff /Users/Shared/telegram-ios

          cd /Users/Shared/telegram-ios

          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_telegram_ios"

          python3 build-system/Make/ImportCertificates.py --path build-input/generated-codesigning/certs
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath=build-input/fork-configuration.json \
            --codesigningInformationPath=build-input/generated-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER" \
            --sideload \
            --outputBuildArtifactsPath=build/artifacts

          cp build/artifacts/Telegram.ipa build/artifacts/Telewhite-sideload-fake-signed.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Telewhite-sideload-fake-signed-ipa
          path: /Users/Shared/telegram-ios/build/artifacts/Telewhite-sideload-fake-signed.ipa
          if-no-files-found: error
